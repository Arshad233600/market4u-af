name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_MOCK_DATA: 'false'

      - name: Install API dependencies
        # --ignore-scripts skips the azure-functions-core-tools binary download (not needed in CI)
        run: npm ci --prefix api --ignore-scripts

      - name: Build API
        run: npm run build --prefix api

      - name: Validate required secrets
        # AUTH_SECRET must be set in GitHub Secrets for ALL deployments (push to main and PR
        # previews). The env: block in the Build And Deploy step syncs these values to Azure
        # Application Settings. If AUTH_SECRET is absent here, the deploy action would sync
        # an empty string to Azure, overwriting any previously-configured value and causing
        # ALL auth endpoints to return 503 in that environment.
        # We therefore FAIL the workflow when AUTH_SECRET is missing or too short on ANY event.
        #
        # How to configure:
        #   GitHub: Settings → Secrets and variables → Actions → New repository secret
        #   Name: AUTH_SECRET  Value: <output of: openssl rand -hex 32>
        #   Azure: Static Web App → Configuration → Application settings (set the same value)
        run: |
          if [ -z "$AUTH_SECRET" ]; then
            # Fail on ALL events (push to main AND pull request preview deploys) so that
            # an empty AUTH_SECRET is never synced to Azure Application Settings.
            # Passing AUTH_SECRET="" to the Azure deploy action would overwrite the
            # correctly-configured Azure Application Setting with an empty string,
            # breaking ALL authenticated endpoints on every deployment.
            echo "::error::AUTH_SECRET is not set in GitHub Secrets. Deployment requires AUTH_SECRET to be configured."
            echo "::error::Generate a secure value with: openssl rand -hex 32"
            echo "::error::Then add it to: (1) GitHub Secrets (Settings→Secrets→Actions) and (2) Azure Static Web App→Configuration→Application settings."
            exit 1
          else
            SECRET_LEN=${#AUTH_SECRET}
            if [ "$SECRET_LEN" -lt 32 ]; then
              echo "::warning::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32). Generate a secure value with: openssl rand -hex 32"
            else
              echo "AUTH_SECRET is configured (length=${SECRET_LEN}). OK."
            fi
          fi
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
        env:
          VITE_USE_MOCK_DATA: "false"
          SqlConnectionString: ${{ secrets.SqlConnectionString }}
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

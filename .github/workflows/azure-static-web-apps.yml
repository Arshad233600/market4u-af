name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_MOCK_DATA: 'false'
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Install API dependencies
        run: npm ci --prefix api

      - name: Run API tests
        run: npm test --prefix api

      - name: Build API
        run: npm run build --prefix api

      - name: Prune API dev dependencies
        # Remove dev-only packages (TypeScript, Vitest, type defs) so that only
        # production dependencies are included in the deployment bundle.
        # This avoids Oryx having to re-run 'npm install --production' inside its
        # build container, which triggered two noisy npm warnings:
        #   • "npm warn config production Use `--omit=dev` instead."
        #   • "npm warn deprecated node-domexception@2.0.2: Use your platform's native DOMException instead"
        # With skip_api_build: true (below), the deploy action ships the pre-built
        # api/ directory as-is instead of re-running the Oryx npm build.
        run: npm prune --omit=dev --prefix api

      - name: Validate required secrets
        # AUTH_SECRET and SqlConnectionString must be set in GitHub Secrets for ALL deployments
        # (push to main and PR previews). The env: block in the Build And Deploy step syncs these
        # values to Azure Application Settings. If a secret is absent here, the deploy action
        # would sync an empty string to Azure, overwriting any previously-configured value and
        # causing ALL endpoints that depend on it to return 503.
        # We therefore FAIL the workflow when these secrets are missing or too short on ANY event.
        #
        # How to configure:
        #   GitHub: Settings → Secrets and variables → Actions → New repository secret
        #   AUTH_SECRET:        openssl rand -hex 32
        #   SqlConnectionString: Server=tcp:<server>.database.windows.net,1433;Initial Catalog=<db>;...
        run: |
          if [ -z "$AUTH_SECRET" ]; then
            # Fail on ALL events (push to main AND pull request preview deploys) so that
            # an empty AUTH_SECRET is never synced to Azure Application Settings.
            # Passing AUTH_SECRET="" to the Azure deploy action would overwrite the
            # correctly-configured Azure Application Setting with an empty string,
            # breaking ALL authenticated endpoints on every deployment.
            echo "::error::AUTH_SECRET is not set in GitHub Secrets. Deployment requires AUTH_SECRET to be configured."
            echo "::error::Generate a secure value with: openssl rand -hex 32"
            echo "::error::Then add it to: (1) GitHub Secrets (Settings→Secrets→Actions) and (2) Azure Static Web App→Configuration→Application settings."
            exit 1
          fi
          SECRET_LEN=${#AUTH_SECRET}
          if [ "$SECRET_LEN" -lt 32 ]; then
            echo "::error::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32 required). A short secret causes all authenticated endpoints to return 503 in production."
            echo "::error::Generate a secure value with: openssl rand -hex 32"
            exit 1
          fi
          # Reject known insecure placeholder values that ship in example config files.
          # These are long enough to pass the length check but offer no real security.
          # This list MUST stay in sync with INSECURE_SECRET_PLACEHOLDERS in
          # api/src/utils/authUtils.ts — any value present at runtime but missing here
          # passes CI yet causes all authenticated endpoints to return 503 in production.
          for placeholder in \
            "change-this-to-a-random-string-min-32-characters-long" \
            "CHANGE_ME_IN_AZURE" \
            "your-secret-key" \
            "your-secret-key-min-32-chars-long" \
            "dev-local-replace-before-deploying-to-azure-production" \
            "local-dev-only-must-be-replaced-for-any-azure-deploy" \
            "changeme"; do
            if [ "$AUTH_SECRET" = "$placeholder" ]; then
              echo "::error::AUTH_SECRET is set to a known insecure placeholder value ('${placeholder}'). Deploying with a placeholder causes all authenticated endpoints to return 503."
              echo "::error::Generate a secure value with: openssl rand -hex 32"
              exit 1
            fi
          done
          echo "AUTH_SECRET is configured (length=${SECRET_LEN}). OK."

          # Validate SqlConnectionString: if none of SqlConnectionString,
          # SQLCONNECTIONSTRING, or AZURE_SQL_CONNECTION_STRING is set, the deploy
          # action syncs empty strings to Azure Application Settings, overwriting any
          # correctly-configured values and causing all database-dependent endpoints
          # (e.g. /api/ads/my-ads) to return 503 (Service Unavailable).
          if [ -z "$SQL_CONN_STRING" ] && [ -z "$SQLCONNECTIONSTRING" ] && [ -z "$AZURE_SQL_CONN_STRING" ]; then
            echo "::error::SqlConnectionString (or SQLCONNECTIONSTRING / AZURE_SQL_CONNECTION_STRING) is not set in GitHub Secrets."
            echo "::error::Without it, the deploy action will overwrite the Azure Application Setting with an empty string,"
            echo "::error::causing all database-dependent API endpoints (e.g. GET /api/ads/my-ads) to return 503."
            echo "::error::Add SQLCONNECTIONSTRING to GitHub Secrets (Settings→Secrets→Actions) with the Azure SQL connection string."
            echo "::error::Format: Server=tcp:<server>.database.windows.net,1433;Initial Catalog=<db>;User Id=<user>;Password=<pass>;Encrypt=True;"
            exit 1
          fi
          echo "SQL connection string is configured. OK."

          # Validate AZURE_STORAGE_CONNECTION_STRING: if not set, the deploy action
          # syncs an empty string to Azure Application Settings, overwriting any
          # previously-configured value and causing POST /api/upload to return 503
          # (storage_not_configured) on every subsequent deployment.
          if [ -z "$STORAGE_CONN_STRING" ]; then
            echo "::error::AZURE_STORAGE_CONNECTION_STRING is not set in GitHub Secrets."
            echo "::error::Without it, the deploy action will overwrite the Azure Application Setting with an empty string,"
            echo "::error::causing POST /api/upload to return 503 (storage_not_configured)."
            echo "::error::Add AZURE_STORAGE_CONNECTION_STRING to GitHub Secrets (Settings→Secrets→Actions)."
            echo "::error::Format: DefaultEndpointsProtocol=https;AccountName=<name>;AccountKey=<key>;EndpointSuffix=core.windows.net"
            exit 1
          fi
          # Reject well-known placeholder values that ship in example config files.
          # A placeholder value would pass the non-empty check above, be deployed to
          # Azure Application Settings, and cause POST /api/upload to return 503 on
          # every request because the SDK cannot authenticate to a fictional account.
          for placeholder in \
            "YOUR_KEY" \
            "your_account_key" \
            "ACCOUNT_KEY_HERE" \
            "YOUR_STORAGE_KEY"; do
            if echo "$STORAGE_CONN_STRING" | grep -qi "$placeholder"; then
              echo "::error::AZURE_STORAGE_CONNECTION_STRING contains a known placeholder value ('${placeholder}')."
              echo "::error::Deploying with a placeholder causes POST /api/upload to return 503 (storage_not_configured)."
              echo "::error::Replace it with a real connection string from your Azure Storage Account."
              echo "::error::Azure Portal → Storage Account → Access keys → Connection string"
              exit 1
            fi
          done
          # Validate AccountName format (Azure storage account names: 3-24 lowercase letters and numbers).
          # An invalid account name indicates the connection string was never updated from the example.
          ACCT_NAME=$(echo "$STORAGE_CONN_STRING" | grep -oP '(?i)(?<=AccountName=)[^;]+' | head -1)
          if [ -n "$ACCT_NAME" ] && ! echo "$ACCT_NAME" | grep -qE '^[a-z0-9]{3,24}$'; then
            echo "::error::AZURE_STORAGE_CONNECTION_STRING has an invalid AccountName: '${ACCT_NAME}'."
            echo "::error::Azure Storage Account names must be 3-24 lowercase letters and numbers only."
            echo "::error::Uppercase letters, underscores, hyphens, and angle brackets are not allowed."
            exit 1
          fi
          # Validate AccountKey length — real Azure Storage keys are 88-char base64 strings.
          # A significantly shorter value is a placeholder or truncation error that will
          # cause AuthenticationFailed errors and 503 responses on every upload attempt.
          ACCT_KEY=$(echo "$STORAGE_CONN_STRING" | grep -oP '(?i)(?<=AccountKey=)[^;]+' | head -1)
          if [ -n "$ACCT_KEY" ] && [ "${#ACCT_KEY}" -lt 40 ]; then
            echo "::error::AZURE_STORAGE_CONNECTION_STRING has a suspiciously short AccountKey (${#ACCT_KEY} chars; expected ~88)."
            echo "::error::A short key indicates a placeholder or truncated value that will cause 503 errors on every upload."
            echo "::error::Copy the full connection string from Azure Portal → Storage Account → Access keys."
            exit 1
          fi
          echo "AZURE_STORAGE_CONNECTION_STRING is configured. OK."

          if [ -z "$STORAGE_CONTAINER" ]; then
            echo "::warning::AZURE_STORAGE_CONTAINER is not set in GitHub Secrets."
            echo "::warning::The upload API will fall back to the default container name 'ads-images'."
            echo "::warning::To use a different container, add AZURE_STORAGE_CONTAINER to GitHub Secrets (Settings→Secrets→Actions)."
          else
            echo "AZURE_STORAGE_CONTAINER is configured. OK."
          fi
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          SQL_CONN_STRING: ${{ secrets.SqlConnectionString }}
          SQLCONNECTIONSTRING: ${{ secrets.SQLCONNECTIONSTRING }}
          AZURE_SQL_CONN_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          STORAGE_CONN_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
          skip_api_build: true
        env:
          VITE_USE_MOCK_DATA: "false"
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Consolidate all SQL connection string secret variants into the single canonical
          # name that db.ts reads first. Using || ensures the first non-empty secret is used
          # rather than writing an empty string to Azure and overwriting a previously valid
          # Application Setting — which was the root cause of GET /api/ads/my-ads → 503.
          SqlConnectionString: ${{ secrets.SqlConnectionString || secrets.SQLCONNECTIONSTRING || secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          RATE_LIMIT_REDIS_URL: ${{ secrets.RATE_LIMIT_REDIS_URL }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_MOCK_DATA: 'false'

      - name: Install API dependencies
        # --ignore-scripts skips the azure-functions-core-tools binary download (not needed in CI)
        run: npm ci --prefix api --ignore-scripts

      - name: Build API
        run: npm run build --prefix api

      - name: Validate required secrets
        # On push to main (deployment): fail immediately if AUTH_SECRET is missing or too short.
        # An empty/missing AUTH_SECRET would crash the function app at startup or cause
        # 401 invalid_token for ALL authenticated requests after deployment.
        # On pull_request: emit a warning only so that PRs can still be reviewed and built
        # even when deployment secrets are not yet configured in the repository.
        run: |
          if [ -z "$AUTH_SECRET" ]; then
            if [ "$GITHUB_EVENT_NAME" = "push" ]; then
              echo "::error::AUTH_SECRET is not set. Add it as a GitHub Actions secret (Settings → Secrets → Actions → New repository secret). Generate a value with: openssl rand -hex 32"
              exit 1
            else
              echo "::warning::AUTH_SECRET is not set. Deployment will fail until this secret is configured. Generate a value with: openssl rand -hex 32"
            fi
          else
            SECRET_LEN=${#AUTH_SECRET}
            if [ "$SECRET_LEN" -lt 32 ]; then
              if [ "$GITHUB_EVENT_NAME" = "push" ]; then
                echo "::error::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32). Generate a secure value with: openssl rand -hex 32"
                exit 1
              else
                echo "::warning::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32). Deployment will fail until this is fixed."
              fi
            else
              echo "AUTH_SECRET is configured (length=${SECRET_LEN}). OK."
            fi
          fi
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
        env:
          VITE_USE_MOCK_DATA: "false"
          SqlConnectionString: ${{ secrets.SqlConnectionString }}
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

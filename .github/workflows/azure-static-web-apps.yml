name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_MOCK_DATA: 'false'
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Install API dependencies
        # --ignore-scripts skips the azure-functions-core-tools binary download (not needed in CI)
        run: npm ci --prefix api --ignore-scripts

      - name: Build API
        run: npm run build --prefix api

      - name: Validate required secrets
        # AUTH_SECRET and SqlConnectionString must be set in GitHub Secrets for ALL deployments
        # (push to main and PR previews). The env: block in the Build And Deploy step syncs these
        # values to Azure Application Settings. If a secret is absent here, the deploy action
        # would sync an empty string to Azure, overwriting any previously-configured value and
        # causing ALL endpoints that depend on it to return 503.
        # We therefore FAIL the workflow when these secrets are missing or too short on ANY event.
        #
        # How to configure:
        #   GitHub: Settings → Secrets and variables → Actions → New repository secret
        #   AUTH_SECRET:        openssl rand -hex 32
        #   SqlConnectionString: Server=tcp:<server>.database.windows.net,1433;Initial Catalog=<db>;...
        run: |
          if [ -z "$AUTH_SECRET" ]; then
            # Fail on ALL events (push to main AND pull request preview deploys) so that
            # an empty AUTH_SECRET is never synced to Azure Application Settings.
            # Passing AUTH_SECRET="" to the Azure deploy action would overwrite the
            # correctly-configured Azure Application Setting with an empty string,
            # breaking ALL authenticated endpoints on every deployment.
            echo "::error::AUTH_SECRET is not set in GitHub Secrets. Deployment requires AUTH_SECRET to be configured."
            echo "::error::Generate a secure value with: openssl rand -hex 32"
            echo "::error::Then add it to: (1) GitHub Secrets (Settings→Secrets→Actions) and (2) Azure Static Web App→Configuration→Application settings."
            exit 1
          fi
          SECRET_LEN=${#AUTH_SECRET}
          if [ "$SECRET_LEN" -lt 32 ]; then
            echo "::error::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32 required). A short secret causes all authenticated endpoints to return 503 in production."
            echo "::error::Generate a secure value with: openssl rand -hex 32"
            exit 1
          fi
          # Reject known insecure placeholder values that ship in example config files.
          # These are long enough to pass the length check but offer no real security.
          for placeholder in \
            "change-this-to-a-random-string-min-32-characters-long" \
            "CHANGE_ME_IN_AZURE" \
            "your-secret-key" \
            "changeme"; do
            if [ "$AUTH_SECRET" = "$placeholder" ]; then
              echo "::error::AUTH_SECRET is set to a known insecure placeholder value ('${placeholder}'). Deploying with a placeholder causes all authenticated endpoints to return 503."
              echo "::error::Generate a secure value with: openssl rand -hex 32"
              exit 1
            fi
          done
          echo "AUTH_SECRET is configured (length=${SECRET_LEN}). OK."

          # Validate SqlConnectionString: if none of SqlConnectionString,
          # SQLCONNECTIONSTRING, or AZURE_SQL_CONNECTION_STRING is set, the deploy
          # action syncs empty strings to Azure Application Settings, overwriting any
          # correctly-configured values and causing all database-dependent endpoints
          # (e.g. /api/ads/my-ads) to return 503 (Service Unavailable).
          if [ -z "$SQL_CONN_STRING" ] && [ -z "$SQLCONNECTIONSTRING" ] && [ -z "$AZURE_SQL_CONN_STRING" ]; then
            echo "::error::SqlConnectionString (or SQLCONNECTIONSTRING / AZURE_SQL_CONNECTION_STRING) is not set in GitHub Secrets."
            echo "::error::Without it, the deploy action will overwrite the Azure Application Setting with an empty string,"
            echo "::error::causing all database-dependent API endpoints (e.g. GET /api/ads/my-ads) to return 503."
            echo "::error::Add SQLCONNECTIONSTRING to GitHub Secrets (Settings→Secrets→Actions) with the Azure SQL connection string."
            echo "::error::Format: Server=tcp:<server>.database.windows.net,1433;Initial Catalog=<db>;User Id=<user>;Password=<pass>;Encrypt=True;"
            exit 1
          fi
          echo "SQL connection string is configured. OK."

          # Validate AZURE_STORAGE_CONNECTION_STRING: if not set, the deploy action
          # syncs an empty string to Azure Application Settings, overwriting any
          # previously-configured value and causing POST /api/upload to return 500
          # (storage not configured) on every subsequent deployment.
          # The upload feature requires both AZURE_STORAGE_CONNECTION_STRING and
          # AZURE_STORAGE_CONTAINER to be configured.
          if [ -z "$STORAGE_CONN_STRING" ]; then
            echo "::error::AZURE_STORAGE_CONNECTION_STRING is not set in GitHub Secrets."
            echo "::error::Without it, the deploy action will overwrite the Azure Application Setting with an empty string,"
            echo "::error::causing POST /api/upload to return 500 (storage not configured)."
            echo "::error::Add AZURE_STORAGE_CONNECTION_STRING to GitHub Secrets (Settings→Secrets→Actions)."
            echo "::error::Format: DefaultEndpointsProtocol=https;AccountName=<name>;AccountKey=<key>;EndpointSuffix=core.windows.net"
            exit 1
          fi
          echo "AZURE_STORAGE_CONNECTION_STRING is configured. OK."

          if [ -z "$STORAGE_CONTAINER" ]; then
            echo "::error::AZURE_STORAGE_CONTAINER is not set in GitHub Secrets."
            echo "::error::Without it, the deploy action will overwrite the Azure Application Setting with an empty string,"
            echo "::error::causing POST /api/upload to return 500 (storage container not configured)."
            echo "::error::Add AZURE_STORAGE_CONTAINER to GitHub Secrets (Settings→Secrets→Actions)."
            echo "::error::Example value: product-images"
            exit 1
          fi
          echo "AZURE_STORAGE_CONTAINER is configured. OK."
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          SQL_CONN_STRING: ${{ secrets.SqlConnectionString }}
          SQLCONNECTIONSTRING: ${{ secrets.SQLCONNECTIONSTRING }}
          AZURE_SQL_CONN_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          STORAGE_CONN_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
        env:
          VITE_USE_MOCK_DATA: "false"
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Consolidate all SQL connection string secret variants into the single canonical
          # name that db.ts reads first. Using || ensures the first non-empty secret is used
          # rather than writing an empty string to Azure and overwriting a previously valid
          # Application Setting — which was the root cause of GET /api/ads/my-ads → 503.
          SqlConnectionString: ${{ secrets.SqlConnectionString || secrets.SQLCONNECTIONSTRING || secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

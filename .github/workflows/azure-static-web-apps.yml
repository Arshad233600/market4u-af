name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_MOCK_DATA: 'false'

      - name: Install API dependencies
        # --ignore-scripts skips the azure-functions-core-tools binary download (not needed in CI)
        run: npm ci --prefix api --ignore-scripts

      - name: Build API
        run: npm run build --prefix api

      - name: Validate required secrets
        # Emit a warning when AUTH_SECRET is missing or too short so that operators
        # know they need to configure the secret, but do NOT fail the build.  A missing
        # AUTH_SECRET does not prevent the static frontend from being deployed; it only
        # affects auth endpoints (which return 503 instead of 401).  Failing here would
        # permanently block all deployments until the secret is added, which is worse
        # than deploying without authentication.  Set AUTH_SECRET in:
        #   GitHub: Settings → Secrets → Actions → New repository secret
        #   Azure:  Static Web App → Configuration → Application settings
        # Generate a value with: openssl rand -hex 32
        run: |
          if [ -z "$AUTH_SECRET" ]; then
            echo "::warning::AUTH_SECRET is not set. Auth endpoints will return 503 until configured."
            echo "::warning::Add AUTH_SECRET to: (1) GitHub Secrets (Settings→Secrets→Actions) and (2) Azure Static Web App→Configuration→Application settings."
            echo "::warning::Generate a value with: openssl rand -hex 32"
          else
            SECRET_LEN=${#AUTH_SECRET}
            if [ "$SECRET_LEN" -lt 32 ]; then
              echo "::warning::AUTH_SECRET is too short (${SECRET_LEN} chars; minimum 32). Generate a secure value with: openssl rand -hex 32"
            else
              echo "AUTH_SECRET is configured (length=${SECRET_LEN}). OK."
            fi
          fi
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true
        env:
          VITE_USE_MOCK_DATA: "false"
          SqlConnectionString: ${{ secrets.SqlConnectionString }}
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

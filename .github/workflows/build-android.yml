name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: market4u-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Market4U ${{ github.ref_name }}
          body: |
            ## Market4U ${{ github.ref_name }} - نسخه جدید اندرید 🎉

            ### 📥 نصب روی اندرید
            1. فایل `app-debug.apk` را دانلود کنید
            2. در تنظیمات گوشی، **"منابع ناشناس"** را فعال کنید
            3. فایل APK را باز کرده و نصب کنید

            ### 📱 نصب روی آیفون (Safari)
            1. سایت [market4u.af](https://market4u.af) را در Safari باز کنید
            2. دکمه Share را بزنید → **Add to Home Screen**

name: Build iOS IPA

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Check signing secrets
        id: check-secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ] || \
             [ -z "$BUILD_PROVISION_PROFILE_BASE64" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$PROVISIONING_PROFILE_NAME" ]; then
            echo "::warning::One or more required Apple signing secrets are missing."
            echo "::warning::Required secrets: BUILD_CERTIFICATE_BASE64, P12_PASSWORD, KEYCHAIN_PASSWORD,"
            echo "::warning::                  BUILD_PROVISION_PROFILE_BASE64, APPLE_TEAM_ID, PROVISIONING_PROFILE_NAME"
            echo "::warning::Add all required secrets to the repository settings to enable iOS builds."
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          else
            echo "All required Apple signing secrets are present."
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Apple signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::notice::Apple signing certificate secrets not configured. Skipping certificate installation."
            echo "::notice::Add BUILD_CERTIFICATE_BASE64, P12_PASSWORD, and KEYCHAIN_PASSWORD secrets to enable code signing."
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          if [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "::notice::Provisioning profile secret not configured. Skipping profile installation."
            echo "::notice::Add BUILD_PROVISION_PROFILE_BASE64 secret to enable code signing."
            exit 0
          fi
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH | \
            plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Archive iOS app
        id: archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          if [ "${{ steps.check-secrets.outputs.has_secrets }}" == "true" ]; then
            echo "Building signed device archive..."
            xcodebuild archive \
              -project ios/App/App.xcodeproj \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              -archivePath $RUNNER_TEMP/App.xcarchive \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME"
            echo "build_type=device" >> $GITHUB_OUTPUT
          else
            echo "::notice::Signing secrets not configured. Building for iOS simulator instead."
            xcodebuild build \
              -project ios/App/App.xcodeproj \
              -scheme App \
              -sdk iphonesimulator \
              -configuration Release \
              -derivedDataPath $RUNNER_TEMP/DerivedData \
              CODE_SIGNING_ALLOWED=NO
            echo "build_type=simulator" >> $GITHUB_OUTPUT
          fi

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          if [ "${{ steps.archive.outputs.build_type }}" == "device" ]; then
            cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>af.market4u.app</key>
                  <string>${PROVISIONING_PROFILE_NAME}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
            xcodebuild -exportArchive \
              -archivePath $RUNNER_TEMP/App.xcarchive \
              -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
              -exportPath $RUNNER_TEMP/ipa
          else
            echo "::notice::Packaging simulator build as zip artifact (no signing secrets configured)."
            SIMULATOR_APP=$(find $RUNNER_TEMP/DerivedData -name "*.app" -path "*iphonesimulator*" | head -1)
            if [ -n "$SIMULATOR_APP" ]; then
              zip -r "$RUNNER_TEMP/ipa/App-Simulator.zip" "$SIMULATOR_APP"
              echo "Simulator build packaged: App-Simulator.zip"
            else
              echo "::warning::Simulator .app not found. Creating placeholder."
              echo "Simulator build - signing secrets required for device IPA" > "$RUNNER_TEMP/ipa/README.txt"
            fi
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: market4u-ios-ipa
          path: ${{ runner.temp }}/ipa/
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Create release with IPA (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Market4U ${{ github.ref_name }}
          body: |
            ## Market4U ${{ github.ref_name }} - نسخه جدید iOS 🎉

            ### 📥 نصب روی آیفون
            1. فایل `.ipa` را دانلود کنید
            2. از طریق Apple Configurator 2 یا AltStore نصب کنید

            ### 📱 نصب PWA روی آیفون (Safari)
            1. سایت [market4u.af](https://market4u.af) را در Safari باز کنید
            2. دکمه Share را بزنید → **Add to Home Screen**
          files: ${{ runner.temp }}/ipa/*

name: Build iOS IPA

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Check signing secrets
        id: check-secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ] && [ -n "$P12_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
            echo "has_signing_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing_secrets=false" >> $GITHUB_OUTPUT
            echo "::warning::Apple signing secrets (BUILD_CERTIFICATE_BASE64, P12_PASSWORD, KEYCHAIN_PASSWORD) are not set. Skipping code signing and IPA export. To enable iOS builds, add the required secrets to the repository."
          fi

      - name: Install Apple signing certificate
        if: steps.check-secrets.outputs.has_signing_secrets == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: steps.check-secrets.outputs.has_signing_secrets == 'true'
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH | \
            plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Archive iOS app
        if: steps.check-secrets.outputs.has_signing_secrets == 'true'
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}"

      - name: Export IPA
        if: steps.check-secrets.outputs.has_signing_secrets == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      - name: Upload IPA artifact
        if: steps.check-secrets.outputs.has_signing_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: market4u-ios-ipa
          path: ${{ runner.temp }}/ipa/App.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always() && steps.check-secrets.outputs.has_signing_secrets == 'true'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Create release with IPA (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Market4U ${{ github.ref_name }}
          files: ${{ runner.temp }}/ipa/App.ipa
          body: |
            ## Market4U ${{ github.ref_name }} 🎉

            ### 📱 نصب روی آیفون (Ad-Hoc)
            1. فایل `App.ipa` را دانلود کنید
            2. با استفاده از **Apple Configurator 2** یا **AltStore** فایل IPA را روی آیفون نصب کنید
            3. در تنظیمات ← عمومی ← مدیریت دستگاه، برنامه را تأیید کنید

            ### 📥 نصب روی اندروید
            1. فایل `app-debug.apk` را دانلود کنید
            2. در تنظیمات گوشی، **"منابع ناشناس"** را فعال کنید
            3. فایل APK را باز کرده و نصب کنید

            ### 🌐 نصب به عنوان PWA روی آیفون (Safari)
            1. سایت [market4u.af](https://market4u.af) را در Safari باز کنید
            2. دکمه Share را بزنید ← **Add to Home Screen**
